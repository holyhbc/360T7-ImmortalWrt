name: Build 360T7 from 237 Source (6.6 Kernel)

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'Enable SSH debug'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout your repo (just for storing config)
      uses: actions/checkout@v4

    - name: Initialize build environment
      run: |
        sudo apt update -y
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

    - name: Clone 237's source (openwrt-24.10-6.6 branch)
      run: |
        git clone --depth 1 -b openwrt-24.10-6.6 https://github.com/padavanonly/immortalwrt-mt798x-6.6.git openwrt
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure for 360T7 + HomeProxy
      run: |
        cd openwrt
        cp defconfig/mt7981-ax3000.config .config
        cat >> .config << EOF
        CONFIG_TARGET_mediatek_filogic_DEVICE_qihoo_360t7=y
        CONFIG_IPV6=y
        
        # HomeProxy 及相关依赖
        #CONFIG_PACKAGE_luci-app-homeproxy=y
       # CONFIG_PACKAGE_homeproxy=y
       # CONFIG_PACKAGE_xray-core=y
        #CONFIG_PACKAGE_sing-box=y
        
        # 其他常用插件
        CONFIG_PACKAGE_luci-app-passwall=y
        CONFIG_PACKAGE_luci-app-aliyundrive-webdav=y
        CONFIG_PACKAGE_luci-app-turboacc=y
        CONFIG_PACKAGE_luci-app-filetransfer=y
        CONFIG_PACKAGE_luci-app-autoreboot=y
        
        # 硬件加速
        CONFIG_PACKAGE_kmod-mediatek_hnat=y
        CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_hnat_mediatek=y
        EOF
        make defconfig

    - name: Download packages
      run: |
        cd openwrt
        make download -j8

    - name: SSH debug (optional)
      if: github.event.inputs.ssh == 'true'
      uses: mxschmitt/action-tmate@v3

    - name: Compile
      run: |
        cd openwrt
        make -j$(nproc)

    - name: Pack artifacts
      run: |
        cd openwrt/bin/targets/mediatek/filogic
        mkdir -p artifacts
        cp *.sysupgrade.bin artifacts/ 2>/dev/null || true
        cp *.manifest artifacts/ 2>/dev/null || true
        cd artifacts
        tar -czvf 360t7_237_6.6.tar.gz *

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: 360T7_6.6_${{ github.run_id }}
        path: openwrt/bin/targets/mediatek/filogic/artifacts/*
